services:
  - type: web
    name: ucl-bartlett-agent
    runtime: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      uvicorn app.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_STORAGE_DIR
        value: /var/data
      - key: PYTHON_VERSION
        value: 3.13.2
    disk:
      name: bartlett-data
      mountPath: /var/data
      sizeGB: 2
